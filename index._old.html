const SideNav = ({ currentPage, onNavigate }) => {

    <nav style={snS.nav}>

        {navItems.map(item => {
          const active = currentPage === item.id;
          return (
            <button key={item.id} onClick={() => onNavigate(item.id)}
              style={{...snS.item, ...(active ? snS.itemActive : {})}}>
              <div style={{...snS.circle, ...(active ? snS.circleActive : snS.circleDefault)}}>

/* ── APP CARD ── */
const AppCard = ({ icon, category, title, description, tag, tagColor, onClick }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{...acS.card, ...(hovered ? acS.cardHover : {}), cursor: onClick ? 'pointer' : 'default'}}>
      <div style={{...acS.iconWrap, background: tagColor === 'amber' ? '#EA8724' : '#540608'}}>
        <i data-lucide={icon} style={{...acS.icon, stroke: tagColor === 'amber' ? '#540608' : '#EA8724'}}></i>
      </div>
      <div style={acS.category}>{category}</div>
      <div style={acS.title}>{title}</div>
      <div style={acS.desc}>{description}</div>
      <div style={acS.footer}>
        <span style={acS.learnMore}>Learn More <i data-lucide="arrow-right" style={acS.arrowIcon}></i></span>
        {tag && <span style={{...acS.tag, background: tag==='New'?'#FCECD0':tag==='Coming Soon'?'#F2DADA':'#F2DADA', color: tag==='New'?'#8C4E00':'#540608'}}>{tag}</span>}
      </div>
    </div>
  );
};

const AboutSection = () => (

    <div style={abS.header}>
      <span style={abS.eyebrow}>About Me</span>

          <div style={abS.stat}><span style={abS.statNum}>3</span><span style={abS.statLabel}>Apps Built</span></div>

    <div style={adS.wrap}>

        <div style={adS.heroIcon}>
          <i data-lucide="wind" style={{ width:'36px', height:'36px', stroke:'#EA8724', strokeWidth:'1.5', display:'block' }}></i>

        <div>
          <span style={adS.category}>Meditation</span>
          <h1 style={adS.title}>Still</h1>
          <div style={adS.tagRow}>
            <span style={adS.tagFree}>Free</span>

      </div>
      <p style={adS.desc}>A gentle habit starter for daily meditation. Still was built for anyone who's tried to meditate and given up — because most apps make it too complicated. This one just asks you to show up.</p>
      <div style={adS.divider}></div>
      <div style={adS.howto}>
        <h2 style={adS.h2}>How to Use</h2>

      <div style={adS.divider}></div>
      <div>

              <div style={cfS.successIcon}><i data-lucide="check" style={{ width:'28px', height:'28px', stroke:'#EA8724', strokeWidth:'2', display:'block' }}></i></div>
              <h3 style={cfS.successTitle}>Message Sent!</h3>
              <p style={cfS.successText}>Thanks for reaching out. I read every message and will get back to you soon.</p>
              <button style={cfS.resetBtn} onClick={() => setForm({name:'',email:'',subject:'',message:'',submitted:false})}>Send Another</button>
            </div>
          ) : (
            <form style={cfS.form} onSubmit={e => { e.preventDefault(); update('submitted', true); }}>
              <div style={cfS.row}>
                <div style={cfS.field}><label style={cfS.label}>Your Name</label><input style={cfS.input} type="text" placeholder="e.g. Alex Johnson" value={form.name} onChange={e => update('name', e.target.value)} /></div>
                <div style={cfS.field}><label style={cfS.label}>Email Address</label><input style={cfS.input} type="email" placeholder="you@example.com" value={form.email} onChange={e => update('email', e.target.value)} /></div>
              </div>
              <div style={cfS.field}><label style={cfS.label}>Subject</label><input style={cfS.input} type="text" placeholder="What's this about?" value={form.subject} onChange={e => update('subject', e.target.value)} /></div>
              <div style={cfS.field}><label style={cfS.label}>Message</label><textarea style={cfS.textarea} rows={5} placeholder="Tell me what's on your mind..." value={form.message} onChange={e => update('message', e.target.value)}></textarea></div>
              <button type="submit" style={cfS.submitBtn}>Send Message</button>
            </form>
          )}
        </div>
        <div style={cfS.infoCol}>
          {[{title:'Response Time', text:"I typically respond within 1–2 days. For urgent matters, mention it in your subject line."},{title:'App Feedback', text:"If you have feedback on a specific app, head to that app's page — there's a dedicated form there."},{title:'Feature Requests', text:"I genuinely read every request. Your ideas have shaped these apps more than you know."}].map((c,i) => (
            <div key={i} style={cfS.infoCard}>
              <div style={cfS.infoTitle}>{c.title}</div>
              <p style={cfS.infoText}>{c.text}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};
const cfS = {
  wrap: { padding:'52px 48px' },
  header: { marginBottom:'36px' },
  eyebrow: { fontFamily:"'Oswald', sans-serif", fontSize:'12px', letterSpacing:'0.2em', textTransform:'uppercase', color:'#EA8724', display:'block', marginBottom:'8px' },
  h1: { fontFamily:"'Oswald', sans-serif", fontSize:'46px', fontWeight:'700', textTransform:'uppercase', letterSpacing:'0.04em', color:'#540608', lineHeight:'1.05', marginBottom:'12px' },
  lead: { fontFamily:"'Lora', serif", fontSize:'16px', color:'#6B5744', lineHeight:'1.65', maxWidth:'480px' },
  layout: { display:'grid', gridTemplateColumns:'1fr 280px', gap:'40px', alignItems:'start' },
  form: { display:'flex', flexDirection:'column', gap:'16px' },
  row: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px' },
  field: { display:'flex', flexDirection:'column', gap:'5px' },
  label: { fontFamily:"'Oswald', sans-serif", fontSize:'10px', fontWeight:'600', letterSpacing:'0.1em', textTransform:'uppercase', color:'#6B5744' },
  input: { padding:'10px 14px', border:'1px solid #E2D8CC', borderRadius:'8px', background:'#F0EAE2', fontFamily:"'Lora', serif", fontSize:'14px', color:'#1A1008', outline:'none' },
  textarea: { padding:'10px 14px', border:'1px solid #E2D8CC', borderRadius:'8px', background:'#F0EAE2', fontFamily:"'Lora', serif", fontSize:'14px', color:'#1A1008', outline:'none', resize:'vertical' },
  submitBtn: { alignSelf:'flex-start', padding:'12px 30px', background:'#540608', color:'#EA8724', border:'none', borderRadius:'8px', fontFamily:"'Oswald', sans-serif", fontSize:'13px', fontWeight:'600', letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' },
  infoCol: { display:'flex', flexDirection:'column', gap:'12px' },
  infoCard: { background:'#FFFFFF', borderRadius:'12px', border:'1px solid #E2D8CC', padding:'16px 18px', boxShadow:'0 1px 6px rgba(84,6,8,0.06)' },
  infoTitle: { fontFamily:"'Oswald', sans-serif", fontSize:'13px', fontWeight:'600', letterSpacing:'0.08em', textTransform:'uppercase', color:'#540608', marginBottom:'6px' },
  infoText: { fontFamily:"'Lora', serif", fontSize:'12px', color:'#6B5744', lineHeight:'1.65' },
  successWrap: { display:'flex', flexDirection:'column', alignItems:'flex-start', gap:'12px', maxWidth:'420px', paddingTop:'20px' },
  successIcon: { width:'56px', height:'56px', borderRadius:'50%', background:'#540608', display:'flex', alignItems:'center', justifyContent:'center' },
  successTitle: { fontFamily:"'Oswald', sans-serif", fontSize:'28px', fontWeight:'700', textTransform:'uppercase', letterSpacing:'0.05em', color:'#540608' },
  successText: { fontFamily:"'Lora', serif", fontSize:'14px', color:'#6B5744', lineHeight:'1.7' },
  resetBtn: { padding:'10px 22px', background:'transparent', color:'#782121', border:'1.5px solid #782121', borderRadius:'8px', fontFamily:"'Oswald', sans-serif", fontSize:'12px', fontWeight:'600', letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' },
};

/* ── APP ── */
const App = () => {
  const [page, setPage] = React.useState('main');
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
  const renderPage = () => {
    switch(page) {
      case 'main':      return <HeroSection onNavigate={setPage} />;
      case 'about':     return <AboutSection />;
      case 'apps':      return <AppsSection onNavigate={setPage} />;
      case 'appdetail': return <AppDetail onNavigate={setPage} />;
      case 'contact':   return <ContactForm />;
      default:          return <HeroSection onNavigate={setPage} />;
    }
  };
  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:'#FAF7F2' }}>
      <SideNav currentPage={page === 'appdetail' ? 'apps' : page} onNavigate={setPage} />
      <main style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        <div style={{ flex:1, overflowY:'auto', height:'100%' }}>
          {renderPage()}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
